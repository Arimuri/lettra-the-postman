name: Deploy mock to Sakura

on:
  push:
    branches: [main]
    paths:
      - 'mock/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp and sshpass
        run: sudo apt-get update && sudo apt-get install -y lftp sshpass

      - name: Debug — try ssh connect
        env:
          HOST: ${{ secrets.SAKURA_HOST }}
          USER: ${{ secrets.SAKURA_USER }}
          SSHPASS: ${{ secrets.SAKURA_PASSWORD }}
        run: |
          echo "host length: ${#HOST}"
          echo "user length: ${#USER}"
          echo "pass length: ${#SSHPASS}"
          sshpass -e ssh -v -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=no "$USER@$HOST" "echo OK; pwd; ls" || echo "ssh exit: $?"

      - name: Upload mock/ to Sakura via rsync
        env:
          HOST: ${{ secrets.SAKURA_HOST }}
          USER: ${{ secrets.SAKURA_USER }}
          SSHPASS: ${{ secrets.SAKURA_PASSWORD }}
          REMOTE: ${{ secrets.SAKURA_REMOTE_DIR }}
        run: |
          set -e
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            mock/ "$USER@$HOST:$REMOTE"
