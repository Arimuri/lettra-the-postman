name: Deploy mock to Sakura

on:
  push:
    branches: [main]
    paths:
      - 'mock/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SAKURA_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SAKURA_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload mock/ to Sakura via rsync
        env:
          HOST: ${{ secrets.SAKURA_HOST }}
          USER: ${{ secrets.SAKURA_USER }}
          REMOTE: ${{ secrets.SAKURA_REMOTE_DIR }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            mock/ "$USER@$HOST:$REMOTE"
