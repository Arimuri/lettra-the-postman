name: Deploy mock to Sakura

on:
  push:
    branches: [main]
    paths:
      - 'mock/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp and sshpass
        run: sudo apt-get update && sudo apt-get install -y lftp sshpass

      - name: Upload mock/ to Sakura via SFTP
        env:
          HOST: ${{ secrets.SAKURA_HOST }}
          USER: ${{ secrets.SAKURA_USER }}
          SSHPASS: ${{ secrets.SAKURA_PASSWORD }}
          REMOTE: ${{ secrets.SAKURA_REMOTE_DIR }}
        run: |
          set -e
          lftp -e "
            set sftp:auto-confirm yes;
            set sftp:connect-program 'sshpass -e ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null';
            set net:timeout 15;
            set net:max-retries 2;
            open sftp://$USER@$HOST;
            mirror -R --verbose --delete mock/ $REMOTE;
            bye
          "
